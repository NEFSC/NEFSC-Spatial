on:
  push:
name: update-pkgdown-site

jobs:
  update-pkgdown-site:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install R package linux dependencies
        run: |
          sudo apt update
          sudo apt-get install libcurl4-openssl-dev libnetcdf-dev libudunits2-dev libgdal-dev libharfbuzz-dev libfribidi-dev
        shell: bash

      - name: Install R packages
        run: Rscript -e 'install.packages(c("pkgdown", "roxygen2", "knitr", "raster", "sf"))'

      - name: Update R function documentation
        run: Rscript -e 'roxygen2::roxygenize()'

      - name: Build site
        run: Rscript -e 'pkgdown::build_site()'

      - name: Set up Git + deploy to ghpages
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'
